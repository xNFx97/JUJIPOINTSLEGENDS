<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reclama tus Jujupoints</title>
<style>
body{
    background:#0f0f0f;
    color:#00ff88;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:50px;
}
.box{
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    width:350px;
    margin:auto;
    box-shadow:0 0 20px #00ff88;
}
.progress{
    width:100%;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}
.progress-bar{
    height:25px;
    width:78%;
    background:linear-gradient(90deg,#00ff88,#00cc66);
    text-align:center;
    line-height:25px;
    color:#000;
    font-weight:bold;
}
button{
    background:#00ff88;
    color:#000;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}
button:hover{
    background:#00cc66;
}
#mensajeFinal{
    display:none;
    margin-top:20px;
    font-weight:bold;
    color:#00ff88;
}
</style>
</head>
<body>

<div class="box">
    <h2>Reclama tus Jujupoints</h2>

    <div class="progress">
        <div class="progress-bar">78%</div>
    </div>

    <p><strong>39483847347</strong> Jujupoints reclamados</p>

    <button onclick="confirmar()">Confirmar y Reclamar</button>

    <p id="mensajeFinal">
        Tus Jujupoints serán reclamados después de 3 win esta noche en la grieta 🔥
    </p>
</div>

<script>
function confirmar(){
    window.open("https://chat.whatsapp.com/EVdEt1Eh5gOGTNESgc2XQo?mode=gi_t","_blank");
    document.getElementById("mensajeFinal").style.display="block";
    setTimeout(function(){
        window.location.href = window.location.href;
    },3000);
}
</script>

</body>
</html>

</body>
</html>
