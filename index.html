<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reclama tus Juju Points</title>

<style>
body{
    background:#0f0f0f;
    color:#00ff88;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:60px;
}

.boton-link{
    color:#00ff88;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    border:2px solid #00ff88;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
}

.boton-link:hover{
    background:#00ff88;
    color:#000;
}

.box{
    display:none;
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    width:420px;
    margin:40px auto;
    box-shadow:0 0 25px #00ff88;
}

.progress{
    width:100%;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress-bar{
    height:25px;
    width:82%;
    background:linear-gradient(90deg,#00ff88,#00cc66);
    text-align:center;
    line-height:25px;
    color:#000;
    font-weight:bold;
    transition:width 0.3s;
}

input{
    padding:10px;
    width:80%;
    border-radius:8px;
    border:none;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-si{
    background:#00ff88;
    color:#000;
}

.btn-no{
    background:#ff4444;
    color:#fff;
}

#mensaje{
    margin-top:20px;
    font-weight:bold;
}

.oculto{
    display:none;
}
</style>
</head>
<body>

<div class="boton-link" onclick="mostrarPanel()">🔥 Reclama tus Juju Points 🔥</div>

<div class="box" id="panel">

    <h2>Panel de Validación Juju</h2>

    <div class="progress">
        <div class="progress-bar" id="barra">82%</div>
    </div>

    <p><strong>2500 Juju Points aprobados</strong></p>
    <p><span id="contador">39483847347</span> Juju Points han sido reclamados</p>

    <!-- Paso 1 -->
    <div id="paso1">
        <p>Ingresa tu nickname:</p>
        <input type="text" id="nickname">
        <br>
        <button class="btn-si" onclick="confirmarNick()">Confirmar</button>
    </div>

    <!-- Paso 2 -->
    <div id="paso2" class="oculto">
        <p>¿Trabajas para Juju?</p>
        <button class="btn-si" onclick="trabajaJuju(true)">Sí</button>
        <button class="btn-no" onclick="trabajaJuju(false)">No</button>
    </div>

    <!-- Paso 3 -->
    <div id="paso3" class="oculto">
        <p>¿Vas a jugar League of Legends esta noche?</p>
        <button class="btn-si" onclick="jugarLoL(true)">Sí</button>
        <button class="btn-no" onclick="jugarLoL(false)">No</button>
    </div>

    <p id="mensaje"></p>

</div>

<script>

let nick = "";
let contador = 39483847347;

// contador automático constante
setInterval(function(){
    contador += Math.floor(Math.random() * 50);
    document.getElementById("contador").innerText = contador;
}, 800);

function mostrarPanel(){
    document.getElementById("panel").style.display="block";
}

function confirmarNick(){
    nick = document.getElementById("nickname").value.trim();

    if(nick === ""){
        alert("Debes ingresar un nickname 😅");
        return;
    }

    document.getElementById("paso1").classList.add("oculto");
    document.getElementById("paso2").classList.remove("oculto");
}

function trabajaJuju(respuesta){
    if(!respuesta){
        document.getElementById("mensaje").style.color="#ff4444";
        document.getElementById("mensaje").innerHTML =
        nick + ", eres libre de ser un esclavo puedes jugar league of legends 😈";
        document.getElementById("paso2").classList.add("oculto");
        return;
    }

    document.getElementById("paso2").classList.add("oculto");
    document.getElementById("paso3").classList.remove("oculto");
}

function jugarLoL(respuesta){

    document.getElementById("paso3").classList.add("oculto");

    if(!respuesta){
        document.getElementById("mensaje").style.color="#ff4444";
        document.getElementById("mensaje").innerHTML =
        nick + ", VALES MONDAAAAAA, MALAPRIDA COYAAA ABORTO DE MICOOO 😈";
    } else {

        // animar barra al 100%
        let barra = document.getElementById("barra");
        let progreso = 82;

        let intervalo = setInterval(function(){
            if(progreso >= 100){
                clearInterval(intervalo);
                barra.innerText = "100%";
                document.getElementById("mensaje").style.color="#00ff88";
                document.getElementById("mensaje").innerHTML =
                "Perfecto " + nick + " 🔥 Estás agendado para jugar esta noche League of Legends. Reclamarás tus 2500 Juju Points después de tres wins.";
            } else {
                progreso++;
                barra.style.width = progreso + "%";
                barra.innerText = progreso + "%";
            }
        }, 40);
    }
}

</script>

</body>
</html>
