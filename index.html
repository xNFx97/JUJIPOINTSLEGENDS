<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reclama tus Juju Points</title>

<style>
body{
    background:#0f0f0f;
    color:#00ff88;
    font-family:Arial, sans-serif;
    text-align:center;
    padding-top:60px;
}

a{
    color:#00ff88;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    border:2px solid #00ff88;
    padding:12px 20px;
    border-radius:12px;
}

a:hover{
    background:#00ff88;
    color:#000;
}

.box{
    display:none;
    background:#1a1a1a;
    padding:30px;
    border-radius:15px;
    width:400px;
    margin:40px auto;
    box-shadow:0 0 25px #00ff88;
}

.progress{
    width:100%;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress-bar{
    height:25px;
    width:82%;
    background:linear-gradient(90deg,#00ff88,#00cc66);
    text-align:center;
    line-height:25px;
    color:#000;
    font-weight:bold;
}

#mensaje{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<a href="#" onclick="iniciar()">🔥 Reclama tus Juju Points 🔥</a>

<div class="box" id="panel">
    <h2>Panel de Validación HuHu</h2>

    <div class="progress">
        <div class="progress-bar">82%</div>
    </div>

    <p><strong>2500 HuHu Points aprobados</strong></p>
    <p>39483847347 Juju Points han sido reclamados</p>

    <p id="mensaje"></p>
</div>

<script>
let nickname = "";

function iniciar(){

    nickname = prompt("Ingresa tu nickname:");

    if(!nickname || nickname.trim() === ""){
        alert("Debes ingresar un nickname válido 😅");
        return;
    }

    let confirmarNick = confirm("Confirmas que tu nickname es: " + nickname + "?");

    if(!confirmarNick){
        alert("Proceso cancelado.");
        return;
    }

    document.getElementById("panel").style.display="block";

    let trabaja = confirm("¿Trabajas para HuHu?");

    let mensaje = document.getElementById("mensaje");

    if(!trabaja){
        mensaje.style.color="#ff4444";
        mensaje.innerHTML = nickname + ", eres libre de ser un esclavo 😈";
        return;
    }

    alert("Estás a un paso de recibir tus 2500 HuHu Points.");

    let juega = confirm("Confirma si vas a jugar League of Legends esta noche.");

    if(!juega){
        mensaje.style.color="#ff4444";
        mensaje.innerHTML = nickname + ", eres un mal jugador. Vuelve cuando estés listo 😈";
    } else {
        mensaje.style.color="#00ff88";
        mensaje.innerHTML = "Perfecto " + nickname + " 🔥 Estás agendado para jugar esta noche League of Legends. Reclamarás tus 2500 HuHu Points después de tres wins.";
    }
}
</script>

</body>
</html>
